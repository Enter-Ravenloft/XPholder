name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xpholder
          POSTGRES_PASSWORD: xpholder
          POSTGRES_DB: xpholder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xpholder"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run test:integration
        env:
          DATABASE_URL: postgresql://xpholder:xpholder@localhost:5432/xpholder
