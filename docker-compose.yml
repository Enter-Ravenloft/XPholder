services:
  bot:
    build:
      context: .
      target: bot
    env_file: .env
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://xpholder:xpholder@db:5432/xpholder
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      target: dashboard
    env_file: .env
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://xpholder:xpholder@db:5432/xpholder
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xpholder
      POSTGRES_PASSWORD: xpholder
      POSTGRES_DB: xpholder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xpholder"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
